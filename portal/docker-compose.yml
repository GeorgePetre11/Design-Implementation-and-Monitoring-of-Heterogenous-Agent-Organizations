services:

  portal-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PROJECT_ROOT=${PROJECT_ROOT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EVALUATOR_API_KEY=${EVALUATOR_API_KEY:-}
      - EVALUATOR_BASE_URL=${EVALUATOR_BASE_URL:-}
      - EVALUATOR_MODEL=${EVALUATOR_MODEL:-}
    volumes:
      # Docker-outside-of-docker: give the portal backend access to the host
      # Docker daemon so it can start/stop the level stacks.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the project at the SAME absolute path inside the container so
      # that compose bind mounts (e.g. ./frontend) resolve to valid host paths
      # when forwarded to the Docker daemon.
      - ${PROJECT_ROOT}:${PROJECT_ROOT}
    restart: unless-stopped

  portal:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - portal-backend
    restart: unless-stopped
