services:

  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - EVALUATOR_API_KEY=${EVALUATOR_API_KEY:-}
      - EVALUATOR_BASE_URL=${EVALUATOR_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      - EVALUATOR_MODEL=${EVALUATOR_MODEL:-gemini-2.5-flash}
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3005:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - evaluator
    restart: unless-stopped
