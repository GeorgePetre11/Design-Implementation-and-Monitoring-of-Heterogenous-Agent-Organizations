services:

  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - EVALUATOR_API_KEY=${EVALUATOR_API_KEY:-}
      - EVALUATOR_BASE_URL=${EVALUATOR_BASE_URL:-https://api.moonshot.ai/v1}
      - EVALUATOR_MODEL=${EVALUATOR_MODEL:-kimi-k2.5}
    restart: unless-stopped
