services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - ENGAGEMENT_MANAGER_MODEL=qwen3:8b
      - MARKET_RESEARCHER_MODEL=qwen3:14b
      - FINANCIAL_ANALYST_MODEL=gpt-oss:20b
      - RISK_ANALYST_MODEL=qwen3:14b
      - STRATEGY_CONSULTANT_MODEL=qwen3.5:27b
      - EVALUATOR_URL=${EVALUATOR_URL:-http://host.docker.internal:8005}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3004:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
