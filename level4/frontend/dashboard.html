<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoring Dashboard — Level 4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: #0a0c10; --bg-panel: #111827; --bg-card: #1f2937;
      --border: #1f2937; --border-light: #374151;
      --text: #e2e8f0; --text-heading: #f8fafc;
      --text-muted: #64748b; --text-content: #cbd5e1;
      --bg-bar: #0f1117;
    }
    :root[data-theme="light"] {
      --bg: #f1f5f9; --bg-panel: #ffffff; --bg-card: #f8fafc;
      --border: #e2e8f0; --border-light: #cbd5e1;
      --text: #1e293b; --text-heading: #0f172a;
      --text-muted: #64748b; --text-content: #475569;
      --bg-bar: #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .dash-header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-header h1 { font-size: 1.05rem; font-weight: 700; color: var(--text-heading); }
    .dash-header h1 span { color: #a78bfa; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .ws-indicator { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--text-muted); }
    .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
    .ws-dot.connected { background: #22c55e; }

    .theme-toggle {
      background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-muted);
      padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem;
      cursor: pointer; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: #a78bfa; color: #a78bfa; }

    .pipeline-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      padding: 0.2rem 0.6rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .pipeline-badge.idle     { background: var(--bg-card); color: var(--text-muted); }
    .pipeline-badge.running  { background: #1e3a5f; color: #7dd3fc; animation: pulse 1.5s infinite; }
    .pipeline-badge.done     { background: #14532d; color: #4ade80; }
    .pipeline-badge.error    { background: #7f1d1d; color: #fca5a5; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      padding: 1rem 1.5rem;
      min-height: calc(100vh - 56px);
    }

    /* -- Pipeline Visualization -- */
    .pipeline-viz {
      grid-column: 1 / -1;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem 1.5rem;
    }
    .pipeline-viz h2 {
      font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 1rem;
    }
    .pipeline-flow {
      display: flex; align-items: center; justify-content: center;
      gap: 0; flex-wrap: wrap;
    }
    .agent-node {
      background: var(--bg-card); border: 2px solid var(--border-light); border-radius: 12px;
      padding: 0.7rem 0.9rem; min-width: 130px; text-align: center;
      position: relative; transition: all 0.4s ease;
    }
    .agent-node.idle      { border-color: var(--border-light); }
    .agent-node.working   { border-color: #3b82f6; box-shadow: 0 0 16px rgba(59,130,246,0.25); }
    .agent-node.done      { border-color: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.15); }
    .agent-node.reviewing { border-color: #eab308; box-shadow: 0 0 14px rgba(234,179,8,0.2); }
    .agent-node.revising  { border-color: #f97316; box-shadow: 0 0 14px rgba(249,115,22,0.25); animation: pulse 1s infinite; }
    .agent-node.approved  { border-color: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.15); }
    .agent-node.error     { border-color: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.2); }
    .agent-icon { font-size: 1.3rem; margin-bottom: 0.2rem; }
    .agent-name { font-size: 0.75rem; font-weight: 600; color: var(--text-heading); }
    .agent-model { font-size: 0.62rem; color: var(--text-muted); margin-top: 0.1rem; }
    .agent-status-badge {
      display: inline-block; font-size: 0.6rem; font-weight: 600;
      padding: 0.1rem 0.4rem; border-radius: 999px; margin-top: 0.3rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .agent-status-badge.idle      { background: var(--bg-card); color: var(--text-muted); }
    .agent-status-badge.working   { background: #1e3a5f; color: #7dd3fc; animation: pulse 1.5s infinite; }
    .agent-status-badge.done      { background: #14532d; color: #4ade80; }
    .agent-status-badge.reviewing { background: #422006; color: #fbbf24; }
    .agent-status-badge.revising  { background: #7c2d12; color: #fdba74; animation: pulse 1s infinite; }
    .agent-status-badge.approved  { background: #14532d; color: #4ade80; }
    .agent-status-badge.error     { background: #7f1d1d; color: #fca5a5; }
    .agent-elapsed { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem; }
    .agent-revision { font-size: 0.55rem; color: #f97316; margin-top: 0.1rem; }

    .flow-arrow {
      display: flex; align-items: center; padding: 0 0.15rem;
      color: var(--border-light); font-size: 1.2rem; transition: color 0.4s;
    }
    .flow-arrow.active { color: #3b82f6; }
    .flow-arrow.done   { color: #22c55e; }
    .flow-arrow.review { color: #eab308; }
    .flow-arrow svg { width: 30px; height: 20px; }

    /* -- Activity Log -- */
    .activity-log {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem; overflow: hidden; display: flex; flex-direction: column;
    }
    .activity-log h2 { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.7rem; }
    .log-scroll { flex: 1; overflow-y: auto; max-height: 420px; }
    .log-entry {
      display: flex; gap: 0.5rem; align-items: flex-start;
      padding: 0.35rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.75rem; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .log-time { color: var(--text-muted); white-space: nowrap; min-width: 55px; font-variant-numeric: tabular-nums; }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .log-dot.pipeline_start, .log-dot.pipeline_done { background: #a78bfa; }
    .log-dot.pipeline_error { background: #ef4444; }
    .log-dot.agent_working  { background: #3b82f6; }
    .log-dot.agent_done     { background: #22c55e; }
    .log-dot.agent_reviewing { background: #eab308; }
    .log-dot.agent_revising  { background: #f97316; }
    .log-dot.agent_approved  { background: #22c55e; }
    .log-dot.agent_error    { background: #ef4444; }
    .log-msg { color: var(--text-content); flex: 1; }

    /* -- Metrics Panel -- */
    .metrics-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    .metrics-panel h2 { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.7rem; }
    .metric-card { background: var(--bg-card); border-radius: 8px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
    .metric-card .label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.15rem; }
    .metric-card .value { font-size: 1.1rem; font-weight: 700; color: var(--text-heading); }
    .metric-card .value.running { color: #7dd3fc; }
    .metric-card .value.done { color: #4ade80; }
    .agent-times { margin-top: 0.8rem; }
    .agent-time-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.3rem 0; border-bottom: 1px solid var(--border); font-size: 0.72rem;
    }
    .agent-time-row .name { color: var(--text-content); min-width: 90px; }
    .agent-time-row .time-val { color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
    .agent-time-row .bar-bg { flex: 1; background: var(--bg-bar); border-radius: 3px; height: 5px; margin: 0 0.5rem; overflow: hidden; }
    .agent-time-row .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .revision-badge-small { font-size: 0.6rem; color: #f97316; margin-left: 0.3rem; }

    /* -- Question preview -- */
    .question-preview { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    .question-preview h2 { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .question-preview p { font-size: 0.82rem; color: var(--text); line-height: 1.5; font-style: italic; }
    .question-preview .empty { color: var(--text-muted); font-style: normal; }

    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: 1fr; }
      .pipeline-flow { flex-direction: column; }
      .flow-arrow svg { transform: rotate(90deg); }
    }
  </style>
</head>
<body>

<div class="dash-header">
  <h1>Monitoring Dashboard <span style="font-size:0.75rem;color:#fbbf24;font-weight:400;margin-left:0.5rem">Level 4 — Hybrid</span></h1>
  <div class="header-right">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Light Mode</button>
    <span class="pipeline-badge idle" id="pipeline-badge">Idle</span>
    <div class="ws-indicator">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">Disconnected</span>
    </div>
  </div>
</div>

<div class="dash-grid">
  <div class="pipeline-viz">
    <h2>Agent Pipeline (Hybrid Hierarchical)</h2>
    <div class="pipeline-flow" id="pipeline-flow"></div>
  </div>

  <div style="display:flex;flex-direction:column;gap:1rem;">
    <div class="question-preview" id="question-box">
      <h2>Client Question</h2>
      <p class="empty">Waiting for analysis...</p>
    </div>
    <div class="metrics-panel">
      <h2>Performance Metrics</h2>
      <div class="metric-card">
        <div class="label">Session ID</div>
        <div class="value" id="metric-session">—</div>
      </div>
      <div class="metric-card">
        <div class="label">Pipeline Status</div>
        <div class="value" id="metric-status">Idle</div>
      </div>
      <div class="metric-card">
        <div class="label">Total Elapsed</div>
        <div class="value" id="metric-elapsed">—</div>
      </div>
      <div class="metric-card">
        <div class="label">Total Revisions</div>
        <div class="value" id="metric-revisions" style="color:#f97316">0</div>
      </div>
      <div class="metric-card">
        <div class="label">Evaluator Score</div>
        <div class="value" id="metric-eval-score">—</div>
        <div class="label" id="metric-eval-weakest" style="margin-top:0.25rem;font-size:0.65rem;"></div>
      </div>
      <div class="agent-times" id="agent-times"></div>
    </div>
  </div>

  <div class="activity-log">
    <h2>Activity Log</h2>
    <div class="log-scroll" id="log-scroll">
      <div class="log-entry">
        <span class="log-time">—</span>
        <span class="log-dot" style="background:var(--text-muted)"></span>
        <span class="log-msg" style="color:var(--text-muted)">Waiting for events...</span>
      </div>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8004";
const WS_URL = "ws://localhost:8004/ws";

const AGENTS = [
  { key: "engagement_manager",  icon: "EM", label: "Engagement Manager",  color: "#a78bfa" },
  { key: "market_researcher",   icon: "MR", label: "Market Researcher",   color: "#38bdf8" },
  { key: "financial_analyst",   icon: "FA", label: "Financial Analyst",   color: "#f59e0b" },
  { key: "risk_analyst",        icon: "RA", label: "Risk Analyst",        color: "#f87171" },
  { key: "strategy_consultant", icon: "SC", label: "Strategy Consultant", color: "#e879f9" },
  { key: "evaluator",           icon: "EV", label: "Evaluator",           color: "#fbbf24" },
];

let ws = null;
let reconnectTimer = null;
let pollTimer = null;

/* -- Theme toggle -- */
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  document.getElementById("theme-btn").textContent = next === "dark" ? "Light Mode" : "Dark Mode";
  localStorage.setItem("theme", next);
}
(function initTheme() {
  const saved = localStorage.getItem("theme");
  if (saved) {
    document.documentElement.setAttribute("data-theme", saved);
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("theme-btn").textContent = saved === "dark" ? "Light Mode" : "Dark Mode";
    });
  }
})();

function buildPipelineFlow() {
  const container = document.getElementById("pipeline-flow");
  container.innerHTML = "";
  AGENTS.forEach((a, i) => {
    const node = document.createElement("div");
    node.className = "agent-node idle";
    node.id = `node-${a.key}`;
    node.innerHTML = `
      <div class="agent-icon">${a.icon}</div>
      <div class="agent-name">${a.label}</div>
      <div class="agent-model" id="model-${a.key}">—</div>
      <div class="agent-status-badge idle" id="status-${a.key}">Idle</div>
      <div class="agent-elapsed" id="elapsed-${a.key}"></div>
      <div class="agent-revision" id="revision-${a.key}"></div>
    `;
    container.appendChild(node);
    if (i < AGENTS.length - 1) {
      const arrow = document.createElement("div");
      arrow.className = "flow-arrow";
      arrow.id = `arrow-${i}`;
      arrow.innerHTML = `<svg viewBox="0 0 40 24"><path d="M4 12h28m0 0l-7-6m7 6l-7 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      container.appendChild(arrow);
    }
  });
}
buildPipelineFlow();

function buildAgentTimes() {
  const container = document.getElementById("agent-times");
  container.innerHTML = "";
  for (const a of AGENTS) {
    const row = document.createElement("div");
    row.className = "agent-time-row";
    row.id = `time-row-${a.key}`;
    row.innerHTML = `
      <span class="name">${a.icon} ${a.label}<span class="revision-badge-small" id="rev-badge-${a.key}"></span></span>
      <div class="bar-bg"><div class="bar-fill" id="time-bar-${a.key}" style="width:0;background:${a.color}"></div></div>
      <span class="time-val" id="time-val-${a.key}">—</span>
    `;
    container.appendChild(row);
  }
}
buildAgentTimes();

function renderState(data) {
  if (data.status === "running" && !pollTimer) {
    pollTimer = setInterval(pollStatus, 2000);
  } else if (data.status !== "running" && pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }

  const badge = document.getElementById("pipeline-badge");
  badge.className = `pipeline-badge ${data.status}`;
  badge.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);

  document.getElementById("metric-session").textContent = data.session_id ? data.session_id.slice(0, 12) + "..." : "—";
  const mStatus = document.getElementById("metric-status");
  mStatus.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);
  mStatus.className = `value ${data.status}`;

  if (data.elapsed != null) {
    document.getElementById("metric-elapsed").textContent = formatElapsed(data.elapsed);
  }

  // Count total revisions
  const totalRevisions = Object.values(data.revisions || {}).filter(r => r.was_revised).length;
  document.getElementById("metric-revisions").textContent = totalRevisions;

  // Evaluator scorecard summary
  const sc = data.scorecard;
  const scoreEl = document.getElementById("metric-eval-score");
  const weakestEl = document.getElementById("metric-eval-weakest");
  if (sc && sc.overall_score != null) {
    const overall = sc.overall_score;
    const color = overall >= 8 ? "#4ade80" : overall >= 6 ? "#fbbf24" : overall >= 4 ? "#f97316" : "#ef4444";
    scoreEl.textContent = `${overall}/10`;
    scoreEl.style.color = color;
    let sub = `Round ${data.scorecard_round || 1}`;
    if (sc.weakest_dimension) sub += ` · weakest: ${sc.weakest_dimension.replace(/_/g, " ")}`;
    weakestEl.textContent = sub;
  } else {
    scoreEl.textContent = "—";
    scoreEl.style.color = "";
    weakestEl.textContent = "";
  }

  const qBox = document.getElementById("question-box");
  if (data.question) {
    qBox.innerHTML = `<h2>Client Question</h2><p>${escapeHtml(data.question)}</p>`;
  }

  let maxElapsed = 0;
  const agentEntries = AGENTS.map(a => {
    const agentData = data.agents?.[a.key];
    if (agentData?.elapsed) maxElapsed = Math.max(maxElapsed, agentData.elapsed);
    return { cfg: a, data: agentData };
  });

  agentEntries.forEach(({ cfg, data: ad }, i) => {
    const node = document.getElementById(`node-${cfg.key}`);
    const statusBadge = document.getElementById(`status-${cfg.key}`);
    const modelEl = document.getElementById(`model-${cfg.key}`);
    const elapsedEl = document.getElementById(`elapsed-${cfg.key}`);
    const revisionEl = document.getElementById(`revision-${cfg.key}`);
    const status = ad?.status || "idle";

    node.className = `agent-node ${status}`;
    statusBadge.className = `agent-status-badge ${status}`;
    statusBadge.textContent = status.charAt(0).toUpperCase() + status.slice(1);
    if (ad?.model) modelEl.textContent = ad.model;
    if (ad?.elapsed) elapsedEl.textContent = `${ad.elapsed.toFixed(1)}s`;
    else elapsedEl.textContent = "";
    if (ad?.was_revised) revisionEl.textContent = `revised (${ad.revision_count}x)`;
    else revisionEl.textContent = "";

    if (i > 0) {
      const arrow = document.getElementById(`arrow-${i - 1}`);
      if (arrow) {
        if (status === "reviewing") arrow.className = "flow-arrow review";
        else if (status === "working" || status === "revising") arrow.className = "flow-arrow active";
        else if (status === "done" || status === "approved") {
          const prevStatus = agentEntries[i-1]?.data?.status;
          if (prevStatus === "done" || prevStatus === "approved") arrow.className = "flow-arrow done";
          else arrow.className = "flow-arrow active";
        } else {
          arrow.className = "flow-arrow";
        }
      }
    }

    const barFill = document.getElementById(`time-bar-${cfg.key}`);
    const timeVal = document.getElementById(`time-val-${cfg.key}`);
    const revBadge = document.getElementById(`rev-badge-${cfg.key}`);
    if (ad?.elapsed && maxElapsed > 0) {
      barFill.style.width = `${(ad.elapsed / maxElapsed) * 100}%`;
      timeVal.textContent = `${ad.elapsed.toFixed(1)}s`;
    } else {
      barFill.style.width = "0";
      timeVal.textContent = status === "working" || status === "revising" ? "..." : "—";
    }
    if (ad?.was_revised) revBadge.textContent = " (R)";
    else revBadge.textContent = "";
  });

  renderLog(data.activity_log || []);
}

function renderLog(entries) {
  const container = document.getElementById("log-scroll");
  container.innerHTML = "";
  for (const entry of entries) {
    const el = document.createElement("div");
    el.className = "log-entry";
    const t = new Date(entry.timestamp * 1000);
    const timeStr = t.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    el.innerHTML = `
      <span class="log-time">${timeStr}</span>
      <span class="log-dot ${entry.type}"></span>
      <span class="log-msg">${escapeHtml(entry.message)}</span>
    `;
    container.appendChild(el);
  }
  container.scrollTop = container.scrollHeight;
}

function formatElapsed(sec) {
  if (sec == null) return "—";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return m > 0 ? `${m}m ${s}s` : `${sec.toFixed(1)}s`;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById("ws-dot").classList.add("connected");
    document.getElementById("ws-label").textContent = "Connected";
    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === "state" && msg.data) renderState(msg.data);
    } catch {}
  };
  ws.onclose = () => {
    document.getElementById("ws-dot").classList.remove("connected");
    document.getElementById("ws-label").textContent = "Reconnecting...";
    scheduleReconnect();
  };
  ws.onerror = () => { ws.close(); };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setInterval(() => { connect(); }, 3000);
}

async function pollStatus() {
  try {
    const res = await fetch(`${API}/status`);
    if (res.ok) { const data = await res.json(); renderState(data); }
  } catch {}
}

async function init() {
  await pollStatus();
  connect();
  pollTimer = setInterval(pollStatus, 2000);
}

init();
</script>
</body>
</html>
